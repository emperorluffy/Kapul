<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Kapul</title>
  </head>
  <body>
    <section class="header">
      <div class="header__logo-box">
        <span class="header__logo">kapul</span>
      </div>

      <nav class="header__nav">
        <a href="#" class="header__link">update</a>
        <button class="btn btn--white">Sign in</button>
        <button class="btn btn--dark">Sign up</button>
        <a href="#" class="header__link">about-us</a>
      </nav>
    </section>
    <section class="menu">
      <div class="menu_intro">
        <div class="card menu_intro_box-1">
          <div class="card__side card__side--front">
            <div class="card__content">
              <h3>Get ready</h3>
              <p class="header__card-img">
                 <div class="header__img-1">
                 <img
                  src="img/pexels-grown.jpg"
                  alt="seedbed"
                
                />
                
              </div>
              </p>
            </div>
          </div>
          <div class="card__side card__side--back card__side--back-1">
            <div class="card__content">
              <h3>Box 1 Back</h3>
              <p>Back side details go here.</p>
            </div>
          </div>
        </div>

        <div class="card menu_intro_box-2">
          <div class="card__side card__side--front">
            <div class="card__content">
              <h3>Get set</h3>
              <p>
              <div class="header__img-1">
                 <img
                  src="img/pexels-grown.jpg"
                  alt="seedbed"
                
                />
                
              </div>
              </p>
            </div>
          </div>
          <div class="card__side card__side--back card__side--back-2">
            <div class="card__content">
              <h3>Box 2 Back</h3>
              <p>Back side details go here.</p>
            </div>
          </div>
        </div>

        <div class="card menu_intro_box-3">
          <div class="card__side card__side--front">
            <div class="card__content">
              <h3>Go</h3>
              <p>
               <div class="header__img-1">
                 <img
                  src="img/pexels-grown.jpg"
                  alt="seedbed"
                
                />
                
               </div>
              </p>
            </div>
          </div>
          <div class="card__side card__side--back card__side--back-3">
            <div class="card__content">
              <h3>Box 3 Back</h3>
              <p>Back side details go here.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="user">User</section>
    <footer>Footer</footer>
  </body>
</html>
